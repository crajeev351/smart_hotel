<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login — The Grand</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0c0e14; font-family: 'DM Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-wrap { width: 360px; }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: #e8dcc8; }
        .login-header p { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #2e3450; margin-top: 4px; }
        .login-card { background: #0f1117; border: 1px solid #1e2130; border-radius: 16px; padding: 32px; }
        .field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #2e3450; margin-bottom: 6px; display: block; }
        .field-group { margin-bottom: 20px; }
        .form-control { background: #13161f !important; border: 1px solid #1e2130 !important; color: #c8d0e0 !important; border-radius: 8px !important; padding: 10px 14px; font-size: 14px; width: 100%; }
        .form-control::placeholder { color: #2e3450 !important; }
        .form-control:focus { border-color: #c9a96e !important; outline: none; box-shadow: 0 0 0 2px rgba(201,169,110,0.1) !important; }
        .btn-login { width: 100%; background: #c9a96e; color: #0f1117; border: none; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; margin-top: 4px; }
        .btn-login:hover { background: #b8954f; }
        .error-msg { color: #7a3d3d; background: #1f0d0d; border: 1px solid #2a1a1a; border-radius: 8px; padding: 10px 14px; font-size: 13px; text-align: center; margin-top: 16px; }
        .divider { height: 1px; background: #1e2130; margin: 24px 0; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-header">
        <h1>The Grand</h1>
        <p>Management Suite</p>
    </div>
    <div class="login-card">
        <form method="POST">
            {% csrf_token %}
            <div class="field-group">
                <label class="field-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="field-group">
                <label class="field-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
    </div>
</div>
</body>
</html>
