<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign In — The Grand Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at center, #1a1d28 0%, #0a0c10 100%);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #c8d0e0;
        }
        .login-wrap {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #e8dcc8;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .login-header p {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #c9a96e;
            font-weight: 500;
        }
        .login-card {
            background: rgba(15, 17, 23, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #1e2130;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,169,110,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,169,110,0.2);
        }
        .field-group {
            margin-bottom: 24px;
        }
        .field-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6b7280;
            margin-bottom: 8px;
            display: block;
            font-weight: 600;
        }
        .form-control {
            background: #13161f !important;
            border: 1px solid #1e2130 !important;
            color: #c8d0e0 !important;
            border-radius: 12px !important;
            padding: 12px 16px;
            font-size: 14px;
            width: 100%;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            border-color: #c9a96e !important;
            outline: none;
            box-shadow: 0 0 0 3px rgba(201,169,110,0.15) !important;
            background: #161a22 !important;
        }
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #c9a96e, #b8954f);
            color: #0f1117;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(201,169,110,0.2);
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #d4b87d, #c9a96e);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(201,169,110,0.3);
        }
        .error-msg {
            color: #ff6b6b;
            background: rgba(31, 13, 13, 0.6);
            border: 1px solid #3a1a1a;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-header">
        <h1>The Grand</h1>
        <p>Management Suite</p>
    </div>
    <div class="login-card">
        <form method="POST">
            {% csrf_token %}
            <div class="field-group">
                <label class="field-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="field-group">
                <label class="field-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
    </div>
</div>
</body>
</html>
