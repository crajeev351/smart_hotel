<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hotel Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            position: fixed;
            width: 220px;
            padding-top: 20px;
        }

        .sidebar a {
            color: #cbd5f5;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
        }

        /* Main Content */
        .main {
            margin-left: 220px;
            padding: 20px;
        }

        /* Navbar */
        .topbar {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 15px;
        }

        .btn-custom {
            background: #f43f5e;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #e11d48;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-center">🏨 Hotel</h4>

    <a href="/categories/">📂 Categories</a>
    <a href="/menu-items/">🍔 Menu</a>
    <a href="/rooms/">🛏 Rooms</a>
    <a href="/logout/">🚪 Logout</a>
</div>

<!-- Main Content -->
<div class="main">

    <!-- Topbar -->
    <div class="topbar shadow-sm">
        <h5>Dashboard</h5>
        <span>Welcome, {{ request.user.username }}</span>
    </div>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
