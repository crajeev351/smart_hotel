{% extends 'base.html' %}
{% block content %}

<div class="stats-row">
    <div class="stat-card">
        <div class="stat-label">Menu Items</div>
        <div class="stat-val" id="menuCount">—</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Total Rooms</div>
        <div class="stat-val" id="roomCount">—</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Total Staff</div>
        <div class="stat-val" id="totalStaff">—</div>
    </div>
</div>

<div class="page-content">
    <div class="section-title">Users by Role</div>
    <div class="card p-4 mb-4">
        <div id="userRoles" style="display:flex; flex-direction:column; gap:14px;"></div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="section-title">Menu Overview</div>
            <div class="card p-4">
                <p style="font-size:13px; color:#2e3450;">Total items currently in the menu catalogue.</p>
                <div style="font-size:36px; font-weight:500; color:#c9a96e; margin-top:8px;" id="menuCountBig">—</div>
                <p style="font-size:11px; color:#2e3450; margin-top:4px;">menu items</p>
            </div>
        </div>
        <div class="col-md-6">
            <div class="section-title">Room Overview</div>
            <div class="card p-4">
                <p style="font-size:13px; color:#2e3450;">Total rooms registered in the system.</p>
                <div style="font-size:36px; font-weight:500; color:#c9a96e; margin-top:8px;" id="roomCountBig">—</div>
                <p style="font-size:11px; color:#2e3450; margin-top:4px;">rooms</p>
            </div>
        </div>
    </div>
</div>

<script>
fetch('/api/reports/menu-count/')
    .then(r => r.json())
    .then(d => {
        document.getElementById('menuCount').innerText = d.total_menu_items;
        document.getElementById('menuCountBig').innerText = d.total_menu_items;
    });

fetch('/api/reports/room-count/')
    .then(r => r.json())
    .then(d => {
        document.getElementById('roomCount').innerText = d.total_rooms;
        document.getElementById('roomCountBig').innerText = d.total_rooms;
    });

fetch('/api/reports/users-by-role/')
    .then(r => r.json())
    .then(data => {
        let total = data.reduce((s, r) => s + r.count, 0);
        document.getElementById('totalStaff').innerText = total;

        let html = '';
        data.forEach(role => {
            let pct = total > 0 ? Math.round((role.count / total) * 100) : 0;
            html += `
            <div>
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span style="font-size:12px; color:#8b9bb4; text-transform:uppercase; letter-spacing:1px;">${role.role}</span>
                    <span style="font-size:12px; color:#4a5068;">${role.count} member${role.count !== 1 ? 's' : ''}</span>
                </div>
                <div style="height:5px; background:#1a1d28; border-radius:3px;">
                    <div style="width:${pct}%; height:100%; background:#c9a96e; border-radius:3px; transition:width 0.4s;"></div>
                </div>
            </div>`;
        });
        document.getElementById('userRoles').innerHTML = html;
    });
</script>

{% endblock %}
